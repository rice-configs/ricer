[workspace]
members = [
    "crates/*"
]

[package]
name = "ricer"
description = "Experimental rice/dotfile manager"
repository = "https://github.com/rice-configs/ricer"
authors = ["Jason Pena <jasonpena@awkless.com>"]
edition = "2021"
license = "GPL-2.0-or-later WITH GPL-CC-1.0"
version = "0.5.0"
rust-version = "1.77.2"
build = "build.rs"

[build-dependencies]
shadow-rs = "0.29"

[dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
clap-verbosity-flag = "2.2"
const_format = "0.2"
directories = "5.0"
env_logger = "0.11"
git2 = "0.19"
indoc = "2"
log = "0.4"
run_script = "0.10"
serde = { version = "1.0", features = ["derive"] }
shadow-rs = "0.29"
thiserror = "1.0"
toml_edit = "0.22"
minus = { version = "5.6", features = [ "static_output", "search" ] }
dialoguer = "0.11.0"

[dev-dependencies]
assert_cmd = "2.0"
pretty_assertions = "1.4"
tempfile = "3.10"
rstest = "0.21"
mockall = "0.13"
ricer_test_tools = { path = "crates/ricer_test_tools" }
test-log = "0.2"
